name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      VITE_SANITY_PROJECT_ID: ${{ secrets.VITE_SANITY_PROJECT_ID || 'jvlq6kos' }}
      VITE_SANITY_DATASET: ${{ secrets.VITE_SANITY_DATASET || 'the_sensorium_school' }}
      VITE_SANITY_API_VERSION: ${{ secrets.VITE_SANITY_API_VERSION || '2026-05-01' }}
      VITE_JOINUS_WEBAPP_URL: ${{ secrets.VITE_JOINUS_WEBAPP_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SENSORIUM_4F96C || secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: sensorium-4f96c
